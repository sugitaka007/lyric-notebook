name: GitHub Pagesへ公開

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: ソースを取得
        uses: actions/checkout@v4
      - name: pnpmを準備
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Node.jsを準備
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: 依存関係をインストール
        run: pnpm install --frozen-lockfile
      - name: 公開パスを決定
        shell: bash
        run: |
          if [[ "${{ github.event.repository.name }}" == "${{ github.repository_owner }}.github.io" ]]; then
            echo "VITE_BASE_PATH=/" >> "$GITHUB_ENV"
          else
            echo "VITE_BASE_PATH=/${{ github.event.repository.name }}/" >> "$GITHUB_ENV"
          fi
      - name: テスト
        run: pnpm test
      - name: Lint
        run: pnpm lint
      - name: 静的ファイルを作成
        run: pnpm build
      - name: Pages用成果物を準備
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: GitHub Pagesへ公開
        id: deployment
        uses: actions/deploy-pages@v4
